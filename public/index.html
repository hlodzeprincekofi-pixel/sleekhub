<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Welcome Back</title>
    <!-- Linking the CSS for styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Decorative Background Blobs (Optional - for visual flair) -->
    <div class="container">
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to access your secure dashboard and connect with the community.</p>
        
        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <!-- Error message container (Hidden by default) -->
            <div id="login-error" style="color: #f87171; font-size: 0.85rem; text-align: center; margin-bottom: 1rem; display: none;"></div>
            
            <button type="submit">Sign In to Account</button>
        </form>

        <!-- Navigation to Signup -->
        <p class="toggle-link">
            New to the platform? <a href="signup.html">Create an account</a>
        </p>
    </div>

    <!-- Linking the JavaScript for form handling -->
    <script src="script.js"></script>
</body>
</html>
