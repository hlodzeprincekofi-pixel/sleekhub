<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Join Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Join Us</h1>
        <p class="subtitle">Begin your journey with us. Create a sleek profile in seconds.</p>
        
        <form id="signup-form" enctype="multipart/form-data">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a unique username" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min. 8 characters" required>
            </div>

            <div class="form-group">
                <label>Bio (Optional)</label>
                <textarea name="bio" rows="2" placeholder="Tell us something interesting..."></textarea>
            </div>

            <div class="form-group">
                <label>Profile Picture</label>
                <input type="file" name="profile_pic" accept="image/*">
            </div>
            
            <button type="submit">Create My Account</button>
        </form>

        <p class="toggle-link">
            Already have an account? <a href="index.html">Sign in instead</a>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
